```yaml
version: "3.8"

services:

  # ==========================================
  # PostgreSQL + pgvector
  # ==========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: grabpic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: grabpic_db
      POSTGRES_USER: grabpic_user
      POSTGRES_PASSWORD: grabpic_pass
    ports:
      - "5432:5432"
    volumes:
      - grabpic-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grabpic_user -d grabpic_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grabpic-network

  # ==========================================
  # Spring Boot Backend
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grabpic-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/grabpic_db
      SPRING_DATASOURCE_USERNAME: grabpic_user
      SPRING_DATASOURCE_PASSWORD: grabpic_pass
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grabpic-network

volumes:
  grabpic-pgdata:

networks:
  grabpic-network:
    driver: bridge
```
