spring.application.name=backend

# ==========================================
# JWT
# ==========================================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ==========================================
# DATABASE
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# GMAIL SMTP
# ==========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ==========================================
# OTP CONFIG
# ==========================================
app.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:10}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:3}

# ==========================================
# PYTHON FACE SERVICE
# ==========================================
python.face.service.url=${PYTHON_FACE_SERVICE_URL:http://localhost:8001/embed}
face.service.url=${FACE_SERVICE_URL:http://localhost:8001/embed}

# ==========================================
# FILE STORAGE
# ==========================================
app.upload.dir=${APP_UPLOAD_DIR:/storage}
